server.port=8080
gemini.api.key=AIzaSyA8NyEIvr4YflmfX03m_uRXWUijaP65-uM
# H2 Database
spring.datasource.url=jdbc:h2:mem:eradb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator
management.endpoints.web.exposure.include=health,info
management.info.app.name=Smart Emergency Resource Allocator
management.info.app.version=1.0.0

# Allocation Settings
era.allocation.max-distance-km=100.0
era.allocation.weight.distance=0.35
era.allocation.weight.severity=0.45
era.allocation.weight.availability=0.20
